# ─────────────────────────────────────────────────────────────────────────────
#  AutoIntel — Nginx reverse proxy + CORS
#
#  Topology
#  ────────
#  Browser ──► Nginx :80
#               ├─ /ml/*  /rag/*  /llm/*  /agent/*  /data/*  /kaggle/*
#               │    └──► FastAPI  (uvicorn) on 127.0.0.1:8000
#               └─ everything else
#                    └──► Next.js  (npm run dev / node server) on 127.0.0.1:3000
#
#  CORS is handled here only. FastAPI has NO CORSMiddleware.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstream definitions ────────────────────────────────────────────────
    upstream fastapi_backend {
        server 127.0.0.1:8000;
    }

    upstream nextjs_frontend {
        server 127.0.0.1:3000;
    }

    # ── CORS helper map ─────────────────────────────────────────────────────
    # Only allow specific origins. Add more origins separated by a pipe (|).
    map $http_origin $cors_origin {
        default                  "";
        "http://localhost:3000"  $http_origin;
        "http://127.0.0.1:3000" $http_origin;
        "http://localhost:80"    $http_origin;
        # Add production domain here, e.g.:
        # "https://your-domain.com"  $http_origin;
    }

    # ── Main server block ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Common CORS headers macro (applied in each location) ─────────
        # Preflight (OPTIONS) is handled inline in each location block.

        # ── FastAPI: all backend API routes ──────────────────────────────
        location ~ ^/(ml|rag|llm|agent|data|kaggle)/ {

            # Handle CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age           86400 always;
                add_header Content-Length 0;
                add_header Content-Type  text/plain;
                return 204;
            }

            # Actual request CORS headers
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Increase timeouts for long-running training requests
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;

            # Support large CSV uploads (keep in sync with MAX_FILE_BYTES in uploadpanel.tsx)
            client_max_body_size 200M;
        }

        # ── Health check passthrough ──────────────────────────────────────
        location = / {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Next.js: everything else (pages, _next/static, etc.) ─────────
        location / {
            proxy_pass         http://nextjs_frontend;
            proxy_http_version 1.1;

            # Required for Next.js HMR websocket (dev mode)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
