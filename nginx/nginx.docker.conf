# ─────────────────────────────────────────────────────────────────────────────
#  AutoIntel — Nginx config for Docker Compose
#
#  Differences from nginx/nginx.conf (dev):
#  • Upstreams use Docker service names (backend / frontend)
#    instead of 127.0.0.1 (containers can't share localhost)
#  • No CORS preflight needed — same origin from the browser's perspective
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstreams — Docker service names resolve via internal DNS ─────────────
    upstream fastapi_backend {
        server backend:8000;
    }

    upstream nextjs_frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── Allow large CSV uploads (up to 200 MB) ────────────────────────────
        client_max_body_size 200M;

        # ── Training endpoint — long timeout (model training takes 30-120s) ───
        location = /ml/train {
            proxy_pass         http://fastapi_backend;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── FastAPI routes ────────────────────────────────────────────────────
        location ~* ^/(ml|rag|llm|agent|data|kaggle)/ {
            proxy_pass         http://fastapi_backend;
            proxy_read_timeout 120s;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check endpoint ─────────────────────────────────────────────
        location = / {
            proxy_pass http://fastapi_backend;
        }

        # ── Everything else → Next.js frontend ───────────────────────────────
        location / {
            proxy_pass         http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
